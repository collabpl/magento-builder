variables:
  INTERNAL_REGISTRY: gitlab.gitlab.svc.cluster.local:5050

.kaniko-build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - AUTH=$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"${AUTH}\"},\"${INTERNAL_REGISTRY}\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json
    - INTERNAL_IMAGE="${INTERNAL_REGISTRY}/${CI_PROJECT_PATH}"
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/${TAG}/Dockerfile"
      --destination "${INTERNAL_IMAGE}:${TAG}"
      --insecure
  rules:
    - if: $CI_COMMIT_TAG

docker-build:
  extends: .kaniko-build
  parallel:
    matrix:
      - TAG: ['8.2', '8.3']
